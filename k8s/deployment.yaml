apiVersion: apps/v1
kind: Deployment
metadata:
  name: draco-habits
  namespace: draco-habits
spec:
  replicas: 2
  selector:
    matchLabels:
      app: draco-habits
  template:
    metadata:
      labels:
        app: draco-habits
    spec:
      containers:
      - name: draco-habits
        image: felipebg1/draco-habits:3cfdf3dca6eea0e0b2cd9694dcce3ad6485017a6
        ports:

        - containerPort: 80
        imagePullPolicy: Always
