apiVersion: apps/v1
kind: Deployment
metadata:
  name: draco-habits
  namespace: draco-habits
spec:
  replicas: 2
  selector:
    matchLabels:
      app: draco-habits
  template:
    metadata:
      labels:
        app: draco-habits
    spec:
      containers:
      - name: draco-habits
        image: felipebg1/draco-habits:ff7adcf3712cbfb18ad59e0ca2d2183fe0b022d9
        ports:

        - containerPort: 80
        imagePullPolicy: Always
