apiVersion: apps/v1
kind: Deployment
metadata:
  name: draco-habits
  namespace: draco-habits
spec:
  replicas: 2
  selector:
    matchLabels:
      app: draco-habits
  template:
    metadata:
      labels:
        app: draco-habits
    spec:
      containers:
      - name: draco-habits
        image: felipebg1/draco-habits:b249f5dc10add300a9566d7c2c4228ea5dbe8f04
        ports:

        - containerPort: 80
        imagePullPolicy: Always
