apiVersion: apps/v1
kind: Deployment
metadata:
  name: draco-habits
  namespace: draco-habits
spec:
  replicas: 2
  selector:
    matchLabels:
      app: draco-habits
  template:
    metadata:
      labels:
        app: draco-habits
    spec:
      containers:
      - name: draco-habits
        image: felipebg1/draco-habits:c2ccae28ac0bb8f14fc3a4d62c7e0d00040ebb57
        ports:

        - containerPort: 80
        imagePullPolicy: Always
