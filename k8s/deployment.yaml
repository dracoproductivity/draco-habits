apiVersion: apps/v1
kind: Deployment
metadata:
  name: draco-habits
  namespace: draco-habits
spec:
  replicas: 2
  selector:
    matchLabels:
      app: draco-habits
  template:
    metadata:
      labels:
        app: draco-habits
    spec:
      containers:
      - name: draco-habits
        image: felipebg1/draco-habits:984ece8aede4c5c29f1b569b7973e7aaa212d5cf
        ports:

        - containerPort: 80
        imagePullPolicy: Always
