apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: habits-ingress
  namespace: draco-habits
  annotations:
    # Vincula o certificado à API da Cloudflare que configuramos
    cert-manager.io/cluster-issuer: cloudflare-dns-issuer 
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - habits.dracohub.com.br
    secretName: draco-habits-tls
  rules:
  - host: habits.dracohub.com.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: habits-service
            port:
              number: 80
