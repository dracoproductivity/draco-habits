name: Deploy Draco Habits

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Configura o suporte para arquitetura ARM (Oracle Cloud)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Configura o Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5  # ESSA LINHA RESOLVE O ERRO
        with:
          context: .
          push: true
          platforms: linux/arm64 
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/draco-habits:${{ github.sha }}

      - name: Update Kubernetes Manifest
        run: |
          # Procura qualquer linha que contenha 'draco-habits:' e substitui a tag inteira
          sed -i "s|image: .*draco-habits:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/draco-habits:${{ github.sha }}|g" k8s/deployment.yaml
          
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          
          git add k8s/deployment.yaml
          
          # O '|| true' impede que o pipeline falhe se você rodar o mesmo código duas vezes (idempotência)
          git commit -m "chore: update habits image tag to ${{ github.sha }} [skip ci]" || echo "Nothing to commit"
          git push
